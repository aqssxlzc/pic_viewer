name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-multimedia-dev libgl1-mesa-dev libzip-dev cmake g++ make extra-cmake-modules

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Package
        run: |
          cd build
          mkdir -p MediaViewer-linux
          cp MediaViewer MediaViewer-linux/
          cd MediaViewer-linux
          tar -czvf ../MediaViewer-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaViewer-linux
          path: build/MediaViewer-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        shell: pwsh
        run: |
          vcpkg install libzip:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          # Install ImageMagick for icon conversion
          choco install imagemagick -y

      - name: Convert icon to ICO
        shell: pwsh
        run: |
          magick convert icon.png -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" -DVulkan_FOUND=OFF
          cmake --build . --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          cd build
          mkdir MediaViewer-windows
          cp Release/MediaViewer.exe MediaViewer-windows/
          # Copy libzip and other vcpkg DLLs
          cp C:/vcpkg/installed/x64-windows/bin/*.dll MediaViewer-windows/  -ErrorAction SilentlyContinue
          cp C:/vcpkg/installed/x64-windows/debug/bin/*.dll MediaViewer-windows/ -ErrorAction SilentlyContinue
          cd MediaViewer-windows
          windeployqt MediaViewer.exe --release --no-translations

      - name: Package
        shell: pwsh
        run: |
          cd build
          Compress-Archive -Path MediaViewer-windows -DestinationPath MediaViewer-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaViewer-windows
          path: build/MediaViewer-windows-x64.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Install dependencies
        run: |
          brew install libzip

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt
        run: |
          cd build
          mkdir -p MediaViewer-mac/MediaViewer.app/Contents/MacOS
          cp MediaViewer MediaViewer-mac/MediaViewer.app/Contents/MacOS/
          macdeployqt MediaViewer-mac/MediaViewer.app

      - name: Package
        run: |
          cd build
          zip -r MediaViewer-mac-x64.zip MediaViewer-mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaViewer-mac
          path: build/MediaViewer-mac-x64.zip

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaViewer-linux
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaViewer-windows
          path: artifacts

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaViewer-mac
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
